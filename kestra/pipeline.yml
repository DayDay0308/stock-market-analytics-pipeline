id: stock_market_pipeline
namespace: stock.market

labels:
  project: stock-market-analytics-pipeline
  exchange: global

description: |
  End-to-end stock market data pipeline.
  Fetches daily OHLCV data from JSE, NYSE, LSE, TSE, EURONEXT and SSE
  and loads it into BigQuery for analytics.

tasks:
  - id: ingest_stock_data
    type: io.kestra.plugin.scripts.python.Script
    description: Fetch stock data from yfinance and upload to GCS
    docker:
      image: python:3.12-slim
    beforeCommands:
      - pip install yfinance google-cloud-storage pandas -q
    script: |
      import yfinance as yf
      import pandas as pd
      from google.cloud import storage
      import os
      from datetime import datetime

      BUCKET_NAME = "zoomcamp-project-493610-stock-data-lake"

      TICKERS = {
          "NYSE": ["AAPL","MSFT","GOOGL","JPM","XOM","AMZN","TSLA","NVDA","BAC","GS",
                   "META","BRK-B","UNH","JNJ","V","WMT","PG","MA","HD","CVX"],
          "JSE":  ["NPN.JO","AGL.JO","SBK.JO","MTN.JO","SOL.JO",
                   "FSR.JO","ABG.JO","VOD.JO","IMP.JO","NED.JO"],
          "LSE":  ["SHEL.L","AZN.L","HSBA.L","ULVR.L","BP.L",
                   "RIO.L","GSK.L","LLOY.L","BARC.L","VOD.L"],
          "TSE":  ["7203.T","6758.T","9984.T","8306.T","6861.T",
                   "9432.T","4063.T","6954.T","8035.T","7974.T"],
          "EURONEXT": ["MC.PA","OR.PA","AIR.PA","TTE.PA","BNP.PA",
                       "ASML.AS","PHIA.AS","HEIA.AS","KPN.AS","ADYEN.AS"],
          "SSE":  ["600519.SS","601398.SS","600036.SS","601288.SS","600276.SS",
                   "601318.SS","600900.SS","601166.SS","600028.SS","601628.SS"]
      }

      def get_exchange(ticker):
          if ticker.endswith(".JO"): return "JSE"
          elif ticker.endswith(".L"): return "LSE"
          elif ticker.endswith(".T"): return "TSE"
          elif ticker.endswith(".PA") or ticker.endswith(".AS"): return "EURONEXT"
          elif ticker.endswith(".SS"): return "SSE"
          else: return "NYSE"

      client = storage.Client()
      bucket = client.bucket(BUCKET_NAME)
      date_str = datetime.now().strftime("%Y-%m-%d")
      total_rows = 0

      for exchange, tickers in TICKERS.items():
          for ticker in tickers:
              try:
                  df = yf.Ticker(ticker).history(period="1d")
                  if df.empty:
                      continue
                  df.reset_index(inplace=True)
                  df["ticker"] = ticker
                  df["exchange"] = get_exchange(ticker)
                  df["Date"] = pd.to_datetime(df["Date"]).dt.tz_localize(None)
                  df["Date"] = df["Date"].dt.date.astype(str)
                  df = df[["Date","ticker","exchange","Open","High","Low","Close","Volume"]]
                  df.columns = ["date","ticker","exchange","open","high","low","close","volume"]
                  blob_name = f"raw/stocks/{date_str}/{ticker.replace('.','_').replace('-','_')}.csv"
                  bucket.blob(blob_name).upload_from_string(df.to_csv(index=False), content_type="text/csv")
                  total_rows += len(df)
                  print(f"Uploaded {ticker}")
              except Exception as e:
                  print(f"Error {ticker}: {e}")

      print(f"Done! {total_rows} rows uploaded")

  - id: load_to_bigquery
    type: io.kestra.plugin.scripts.python.Script
    description: Load data from GCS into BigQuery
    docker:
      image: python:3.12-slim
    beforeCommands:
      - pip install google-cloud-bigquery google-cloud-storage pandas db-dtypes pyarrow -q
    script: |
      from google.cloud import bigquery, storage
      from google.cloud.bigquery import LoadJobConfig, SchemaField
      import pandas as pd
      import io

      PROJECT_ID = "zoomcamp-project-493610"
      BUCKET_NAME = "zoomcamp-project-493610-stock-data-lake"
      TABLE_REF = f"{PROJECT_ID}.stock_market_data.raw_stocks"

      bq = bigquery.Client()
      gcs = storage.Client()
      bucket = gcs.bucket(BUCKET_NAME)
      blobs = [b for b in bucket.list_blobs(prefix="raw/stocks/") if b.name.endswith(".csv")]

      total = 0
      for blob in blobs:
          try:
              df = pd.read_csv(io.StringIO(blob.download_as_text()))
              df["date"] = pd.to_datetime(df["date"]).dt.date
              job = bq.load_table_from_dataframe(df, TABLE_REF,
                  job_config=LoadJobConfig(write_disposition="WRITE_APPEND"))
              job.result()
              total += len(df)
              print(f"Loaded {blob.name.split('/')[-1]}: {len(df)} rows")
          except Exception as e:
              print(f"Error: {e}")

      print(f"Total rows loaded: {total}")

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 1 * * *"
    description: Run daily at 1 AM to fetch previous day's data