version: 2

models:
  - name: stg_stocks
    description: "Staged stock market data cleaned and typed from raw source"
    columns:
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: exchange
        description: "Stock exchange name"
        tests:
          - not_null
          - accepted_values:
              values: ['NYSE', 'JSE', 'LSE', 'TSE', 'EURONEXT', 'SSE']
      - name: close
        description: "Closing price"
        tests:
          - not_null