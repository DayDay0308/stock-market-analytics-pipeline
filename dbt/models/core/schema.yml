version: 2

models:
  - name: fct_stock_daily
    description: "Daily stock metrics with moving averages and volatility"
    columns:
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: exchange
        description: "Stock exchange"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: pct_change
        description: "Daily percentage change"
      - name: moving_avg_30d
        description: "30 day moving average"
      - name: volatility_30d
        description: "30 day price volatility"

  - name: fct_exchange_summary
    description: "Daily summary statistics aggregated by exchange"
    columns:
      - name: exchange
        description: "Stock exchange name"
        tests:
          - not_null
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: num_stocks
        description: "Number of stocks traded"
      - name: avg_pct_change
        description: "Average percentage change across all stocks"
      - name: total_volume
        description: "Total trading volume"